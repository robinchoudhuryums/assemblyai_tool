# CallAnalyzer — Continuous Integration
# Runs on every push and PR to catch issues before they reach production.
#
# Gates:
#   1. Type checking (tsc)
#   2. Unit tests (Node.js test runner)
#   3. Frontend build verification (Vite)
#   4. Full production build (Vite + esbuild)
#   5. Dependency audit (npm audit)
#
# HIPAA note: This workflow does NOT access any PHI. It only runs
# type checks, tests, and builds against the source code.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true  # Cancel stale CI runs on the same branch

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Blocking gate. deploy.sh on the EC2 box no longer runs `npm run test`
    # (the 1GB t3.nano OOMs on a 966-test suite — see deploy #142 post-mortem
    # 2026-04-21 and the rationale comment in deploy.sh [3/5]). CI is now the
    # sole merge gate for type check + backend tests + frontend tests + build,
    # so `continue-on-error` cannot stay here — a failure must block the PR
    # instead of letting a broken main trigger the deploy workflow.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run backend unit tests with coverage
        # Capture output via tee so the threshold check step can grep it
        # without re-running the test suite (double-runs can fail due to
        # --test-force-exit leaving residual state between invocations).
        run: npm run test:coverage 2>&1 | tee coverage-output.log

      - name: Check backend coverage threshold
        run: |
          # Extract statement coverage from c8 text-summary output (captured above).
          # Threshold set to 45% — actual coverage is ~46% as of 2026-04-17.
          # NOTE: CLAUDE.md previously documented coverage as ~67% but the
          # actual measurement is lower. Investigation deferred; for now this
          # gate catches regressions below current level.
          STMT=$(grep "Statements" coverage-output.log | head -1 | grep -oP '[\d.]+%' | head -1 | tr -d '%' || true)
          echo "Backend statement coverage: ${STMT}%"
          if [ -z "$STMT" ]; then
            echo "::warning::Could not parse coverage — skipping gate"
          else
            THRESHOLD=45
            if [ "$(echo "$STMT < $THRESHOLD" | bc -l)" = "1" ]; then
              echo "::error::Backend coverage ${STMT}% is below ${THRESHOLD}% threshold"
              exit 1
            fi
          fi

      - name: Run frontend unit tests
        run: npm run test:client

      - name: Build production bundle
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=1536'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 9 specs / 2 Playwright projects:
    #   - "chromium" (default): 8 specs against port 5000 (no REQUIRE_MFA)
    #   - "mfa-required": 1 spec against port 5001 (REQUIRE_MFA=true)
    # Two dev-server instances run in parallel via webServer: [...].
    # Static-analysis verification (May 2026) confirmed all UI testids
    # and the MSW-mocked AssemblyAI/Bedrock/S3 paths resolve cleanly.
    # Flipped blocking so real failures surface instead of being masked.
    # If a flake fights a fix-forward push, revert this single line —
    # don't add per-spec disable; we lose the whole signal that way.
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          SESSION_SECRET: 'ci-test-secret-e2e-only'
          AUTH_USERS: 'testadmin:TestPass123!:admin:Test Admin,testviewer:ViewPass123!:viewer:Test Viewer,testmfa:MfaTestPass123!:admin:Test MFA'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit for vulnerabilities
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true  # Don't block deploys on advisory-only vulns; log for visibility

      - name: Check for critical vulnerabilities
        run: |
          # Fail only on critical severity — these must be fixed before merge
          CRITICAL=$(npm audit --omit=dev --json 2>/dev/null | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            try {
              const audit = JSON.parse(data);
              const meta = audit.metadata?.vulnerabilities || {};
              console.log(meta.critical || 0);
            } catch { console.log(0); }
          ")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerability(ies). Fix before merging."
            npm audit --omit=dev 2>/dev/null || true
            exit 1
          fi
