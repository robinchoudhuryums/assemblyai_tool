# CallAnalyzer — Deploy to EC2
# Deploys to production ONLY after CI passes. Also supports manual trigger.
#
# Flow:
#   1. On push to main → CI workflow runs (tests, type check, build)
#   2. After CI passes → this workflow deploys via SSH
#   3. Manual trigger (workflow_dispatch) skips CI gate (for hotfixes)
#
# Required GitHub Secrets:
#   EC2_SSH_KEY        — Private SSH key (PEM) for the EC2 instance
#   EC2_HOST           — EC2 public IP or hostname
#   EC2_USER           — SSH username (e.g. "ec2-user" or "ubuntu")
#   EC2_APP_DIR        — App directory on EC2 (e.g. "/home/ec2-user/assemblyai_tool")
#
# HIPAA note: This workflow does NOT handle PHI. It only triggers a
# code pull + build + restart on the EC2 instance. All sensitive data
# (credentials, audio files, transcripts) stays on the server.

name: Deploy to EC2

on:
  # Deploy after CI workflow completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Allow manual trigger for hotfixes (bypasses CI gate)
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (default: main)'
        required: false
        default: 'main'

concurrency:
  group: deploy
  cancel-in-progress: false  # Don't cancel in-progress deploys

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only deploy if: CI succeeded (workflow_run) OR manual trigger (workflow_dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "::error::EC2_HOST secret is not set. Go to repo Settings > Secrets and variables > Actions to configure it."
            exit 1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "::error::EC2_SSH_KEY secret is not set."
            exit 1
          fi

      - name: Determine branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            echo "=== GitHub Actions Deploy ==="
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ steps.branch.outputs.name }}"
            echo "Trigger: ${{ github.event_name }}"
            ./deploy.sh ${{ steps.branch.outputs.name }}

      - name: Post-deploy health verification
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 1m
          script: |
            # Independent health check after deploy.sh completes
            # Validates both HTTP status AND response body content
            for i in 1 2 3 4 5; do
              BODY=$(curl -sf --max-time 10 http://localhost:${PORT:-5000}/api/health 2>/dev/null) && break
              echo "Health check attempt $i failed, retrying in 5s..."
              sleep 5
            done
            if [ -z "$BODY" ]; then
              echo "::error::Health check failed — no response after 5 attempts"
              pm2 logs --lines 20 --nostream 2>/dev/null || true
              exit 1
            fi
            # Verify the response contains expected status field
            if ! echo "$BODY" | grep -q '"status"'; then
              echo "::error::Health check returned unexpected response: $BODY"
              exit 1
            fi
            # Check for degraded status (e.g., audit log failures)
            if echo "$BODY" | grep -q '"degraded"'; then
              echo "::warning::Health check returned degraded status: $BODY"
            fi
            echo "Health check passed: $BODY"

      - name: Post deploy summary
        if: always()
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ steps.branch.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
