<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Warm-paper square matching the redesigned app shell.
       Copper-soft fill (same token as button hovers and active nav)
       with a faint copper hairline echoing the document aesthetic. -->
  <rect width="32" height="32" rx="7" fill="#f2e1d2"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5"
        fill="none" stroke="#b06236" stroke-width="0.75" opacity="0.4"/>
  <!-- Audio waveform bars (copper) — product identity carried through
       from the prior favicon, just re-tinted into the warm-paper palette. -->
  <g fill="#b06236">
    <rect x="5"    y="13" width="2.25" height="6"  rx="1.125"/>
    <rect x="8.5"  y="10" width="2.25" height="12" rx="1.125"/>
    <rect x="12"   y="6"  width="2.25" height="20" rx="1.125"/>
    <rect x="15.5" y="9"  width="2.25" height="14" rx="1.125"/>
    <rect x="19"   y="5"  width="2.25" height="22" rx="1.125"/>
    <rect x="22.5" y="11" width="2.25" height="10" rx="1.125"/>
    <rect x="26"   y="14" width="2.25" height="4"  rx="1.125"/>
  </g>
</svg>
